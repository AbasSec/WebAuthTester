# WebAuthTester Pro Configuration
# Targeted Audit for Firebase SPA

target: "https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=AIzaSyB..." # (Example Key)
discovery_depth: 5
max_crawl_time: 60

# Custom Wordlists for Test
wordlists:
  usernames: "wordlists/test_users.txt"
  passwords: "wordlists/test_pass.txt"

concurrency: 1
timeout: 10
proxy: null
