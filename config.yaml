# WebAuthTester Pro Configuration
# Professional Authentication Auditing Framework

# Default target for audit (can be overridden by CLI)
target: null

# Maximum discovery settings
discovery_depth: 3
max_crawl_time: 60

# Default Wordlists (Update as needed)
wordlists:
  usernames: "wordlists/usernames.txt"
  passwords: "wordlists/passwords.txt"

# Performance & Stealth
concurrency: 10
timeout: 15
proxy: null

# Field Mapping for API Audits (e.g. Firebase, REST APIs)
mapping:
  username: "username"
  password: "password"
  extra: {}
